<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>aihub V1.2.0 - 即时聊天（支持群聊）</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #ededed;
      --bg-secondary: #f5f5f5;
      --bg-white: #ffffff;
      --text-primary: #191919;
      --text-secondary: #888888;
      --text-secondary-light: #b8b8b8;
      --accent: #07c160;
      --accent-light: #07c16020;
      --border-color: #e0e0e0;
      --message-sent: #95ec69;
      --message-received: #ffffff;
      --tab-active: #07c160;
      --tab-inactive: #999999;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg-primary);
      position: relative;
    }
    
    .header {
      background: var(--bg-secondary);
      padding: 12px 16px;
      text-align: center;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 500;
    }
    
    .header .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-primary);
      cursor: pointer;
    }
    
    .header .action-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 22px;
      color: var(--text-primary);
      cursor: pointer;
    }
    
    .page {
      display: none;
      height: calc(100vh - 110px);
      overflow-y: auto;
    }
    
    .page.active {
      display: block;
    }
    
    .chat-list-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    
    .chat-list-item:active {
      background: var(--accent-light);
    }
    
    .chat-list-item .avatar {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    
    .chat-list-item .avatar.group {
      background: #ff9800;
    }
    
    .chat-list-item .info {
      flex: 1;
      overflow: hidden;
    }
    
    .chat-list-item .name-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    
    .chat-list-item .name {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
    }
    
    .chat-list-item .time {
      font-size: 12px;
      color: var(--text-secondary-light);
    }
    
    .chat-list-item .last-msg {
      font-size: 14px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .chat-container {
      display: none;
      flex-direction: column;
      height: calc(100vh - 110px);
    }
    
    .chat-container.active {
      display: flex;
    }
    
    .chat-header-bar {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }
    
    .chat-member-count {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      display: flex;
      align-items: flex-start;
    }
    
    .message.sent {
      flex-direction: row-reverse;
    }
    
    .message .avatar {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin: 0 8px;
    }
    
    .message.sent .avatar {
      background: #07c160;
    }
    
    .message .content-wrapper {
      max-width: 70%;
    }
    
    .message .name {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
      margin-left: 4px;
    }
    
    .message .bubble {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
      word-wrap: break-word;
      position: relative;
    }
    
    .message.received .bubble {
      background: var(--message-received);
      border: 1px solid var(--border-color);
    }
    
    .message.received .bubble::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 12px;
      border: 6px solid transparent;
      border-right-color: var(--border-color);
    }
    
    .message.received .bubble::after {
      content: '';
      position: absolute;
      left: -6px;
      top: 13px;
      border: 5px solid transparent;
      border-right-color: var(--message-received);
    }
    
    .message.sent .bubble {
      background: var(--message-sent);
    }
    
    .message.sent .bubble::before {
      content: '';
      position: absolute;
      right: -8px;
      top: 12px;
      border: 6px solid transparent;
      border-left-color: var(--message-sent);
    }
    
    .input-bar {
      display: flex;
      align-items: flex-end;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      gap: 8px;
    }
    
    .input-bar textarea {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.4;
      max-height: 100px;
      resize: none;
      font-family: inherit;
      background: var(--bg-white);
    }
    
    .input-bar textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .input-bar .send-btn {
      padding: 8px 16px;
      background: var(--message-sent);
      color: var(--text-primary);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    
    .input-bar .send-btn:active {
      background: #7bc959;
    }
    
    .tab-bar {
      display: flex;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      position: sticky;
      bottom: 0;
      height: 54px;
    }
    
    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--tab-inactive);
      font-size: 10px;
      padding: 4px 0;
    }
    
    .tab-item.active {
      color: var(--tab-active);
    }
    
    .tab-item .icon {
      font-size: 24px;
      margin-bottom: 2px;
    }
    
    .contact-list-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    
    .contact-list-item:active {
      background: var(--accent-light);
    }
    
    .contact-list-item .avatar {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 12px;
    }
    
    .contact-list-item .name {
      font-size: 16px;
      color: var(--text-primary);
    }
    
    .contact-list-item .arrow {
      margin-left: auto;
      color: var(--text-secondary-light);
      font-size: 18px;
    }
    
    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 54px);
      padding: 40px 30px;
      background: var(--bg-white);
    }
    
    .auth-logo {
      margin-bottom: 40px;
    }
    
    .auth-logo .logo {
      width: 80px;
      height: 80px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      margin: 0 auto 16px;
    }
    
    .auth-logo h2 {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: var(--text-primary);
    }
    
    .form-group {
      margin-bottom: 20px;
      width: 100%;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 16px;
      background: var(--bg-primary);
      font-family: inherit;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      cursor: pointer;
    }
    
    .btn:active {
      background: #06ad56;
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      margin-top: 16px;
    }
    
    .btn-secondary:active {
      background: var(--accent-light);
    }
    
    .auth-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
    }
    
    .auth-link a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .error {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
    }
    
    .modal-overlay.active {
      display: block;
    }
    
    .modal {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-white);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s;
    }
    
    .modal.active {
      transform: translateY(0);
    }
    
    .modal h3 {
      font-size: 17px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .modal .form-group {
      margin-bottom: 16px;
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
    }
    
    .modal-actions .btn {
      flex: 1;
    }
    
    .btn-cancel {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .btn-cancel:active {
      background: var(--border-color);
    }
    
    .group-info-section {
      padding: 12px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    
    .group-info-section:active {
      background: var(--accent-light);
    }
    
    .group-info-section .title {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .group-info-section .members {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .member-avatar.more {
      background: var(--border-color);
      color: var(--text-secondary);
      font-size: 12px;
    }
    
    .create-group-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      color: var(--accent);
    }
    
    .create-group-item:active {
      background: var(--accent-light);
    }
    
    .create-group-item .icon {
      font-size: 24px;
      margin-right: 12px;
    }
    
    .create-group-item .text {
      font-size: 16px;
    }
    
    .selectable-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    
    .selectable-item:active {
      background: var(--accent-light);
    }
    
    .selectable-item .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border-color);
      border-radius: 50%;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: white;
    }
    
    .selectable-item.selected .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    .selectable-item .avatar {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-right: 12px;
    }
    
    .selectable-item .name {
      font-size: 16px;
      color: var(--text-primary);
    }
    
    .selected-count {
      text-align: center;
      padding: 12px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .settings-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
    }
    
    .settings-item:active {
      background: var(--accent-light);
    }
    
    .settings-item .label {
      font-size: 16px;
      color: var(--text-primary);
      flex: 1;
    }
    
    .settings-item .value {
      font-size: 15px;
      color: var(--text-secondary);
      margin-right: 8px;
    }
    
    .settings-item .arrow {
      color: var(--text-secondary-light);
      font-size: 18px;
    }
    
    .logout-btn {
      color: #ff4d4f;
      justify-content: center;
      margin-top: 20px;
    }
    
    .profile-header {
      text-align: center;
      padding: 30px 20px;
      background: var(--bg-white);
    }
    
    .profile-header .avatar {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }
    
    .profile-header .name {
      font-size: 20px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    
    .profile-header .id {
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="page active" id="chatPage">
      <div class="header">
        <h1>aihub</h1>
      </div>
      <div id="chatList">
        <div class="empty-state">暂无会话<br>点击右上角+发起新聊天</div>
      </div>
    </div>
    
    <div class="page" id="contactPage">
      <div class="header">
        <h1>通讯录</h1>
      </div>
      <div class="contact-list-item" id="showAllContacts">
        <div class="avatar">👥</div>
        <div class="name">发起群聊</div>
        <div class="arrow">›</div>
      </div>
      <div id="contactList"></div>
    </div>
    
    <div class="page" id="groupPage">
      <div class="header">
        <button class="back-btn" onclick="showTab('chat')">‹</button>
        <h1>我的群聊</h1>
      </div>
      <div id="groupList">
        <div class="empty-state">暂无群聊<br>从通讯录发起群聊</div>
      </div>
    </div>
    
    <div class="page" id="profilePage">
      <div class="header">
        <h1>我的</h1>
      </div>
      <div class="profile-header" id="profileHeader">
        <div class="avatar" id="profileAvatar"></div>
        <div class="name" id="profileName"></div>
        <div class="id" id="profileId"></div>
      </div>
      <div style="height: 16px;"></div>
      <div class="settings-item" id="editNameBtn">
        <div class="label">设置昵称</div>
        <div class="arrow">›</div>
      </div>
      <div class="settings-item" id="changePasswordBtn">
        <div class="label">修改密码</div>
        <div class="arrow">›</div>
      </div>
      <div class="settings-item logout-btn" id="logoutBtn">
        <div class="label">退出登录</div>
      </div>
    </div>
    
    <div class="tab-bar">
      <div class="tab-item active" data-tab="chat" onclick="showTab('chat')">
        <div class="icon">💬</div>
        <div>聊天</div>
      </div>
      <div class="tab-item" data-tab="contact" onclick="showTab('contact')">
        <div class="icon">👥</div>
        <div>通讯录</div>
      </div>
      <div class="tab-item" data-tab="group" onclick="showTab('group')">
        <div class="icon">👫</div>
        <div>群聊</div>
      </div>
      <div class="tab-item" data-tab="profile" onclick="showTab('profile')">
        <div class="icon">👤</div>
        <div>我的</div>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="chatDetailOverlay" onclick="closeChatDetail()"></div>
  <div class="modal" id="chatDetailModal">
    <div class="chat-header-bar">
      <span class="chat-member-count" id="chatMemberCount" onclick="showGroupMembers()"></span>
    </div>
    <div class="chat-container active" id="messageContainer">
      <div class="messages" id="messages"></div>
      <div class="input-bar">
        <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="selectContactOverlay" onclick="closeSelectContact()"></div>
  <div class="modal" id="selectContactModal">
    <div class="header">
      <button class="back-btn" onclick="closeSelectContact()">‹</button>
      <h1>选择联系人</h1>
      <button class="action-btn" onclick="createGroup()">✓</button>
    </div>
    <div class="selected-count" id="selectedCount">已选择 0 人</div>
    <div id="selectableContactList" style="height: calc(100vh - 200px); overflow-y: auto;"></div>
  </div>
  
  <div class="modal-overlay" id="groupMembersOverlay" onclick="closeGroupMembers()"></div>
  <div class="modal" id="groupMembersModal">
    <div class="header">
      <button class="back-btn" onclick="closeGroupMembers()">‹</button>
      <h1>群成员</h1>
    </div>
    <div id="groupMembersList" style="height: calc(100vh - 120px); overflow-y: auto;"></div>
  </div>
  
  <div class="modal-overlay" id="editNameOverlay" onclick="closeEditName()"></div>
  <div class="modal" id="editNameModal">
    <h3>设置昵称</h3>
    <div class="form-group">
      <input type="text" id="newNameInput" placeholder="输入新昵称">
    </div>
    <div class="error" id="editNameError"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeEditName()">取消</button>
      <button class="btn" onclick="saveName()">保存</button>
    </div>
  </div>
  
  <div class="modal-overlay" id="changePasswordOverlay" onclick="closeChangePassword()"></div>
  <div class="modal" id="changePasswordModal">
    <h3>修改密码</h3>
    <div class="form-group">
      <input type="password" id="currentPasswordInput" placeholder="当前密码">
    </div>
    <div class="form-group">
      <input type="password" id="newPasswordInput" placeholder="新密码">
    </div>
    <div class="form-group">
      <input type="password" id="confirmPasswordInput" placeholder="确认新密码">
    </div>
    <div class="error" id="changePasswordError"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeChangePassword()">取消</button>
      <button class="btn" onclick="savePassword()">保存</button>
    </div>
  </div>
  
  <div class="modal-overlay" id="authOverlay"></div>
  <div class="auth-container" id="authContainer">
    <div class="auth-logo">
      <div class="logo">💬</div>
      <h2>aihub</h2>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <input type="text" id="loginId" placeholder="账号ID">
      </div>
      <div class="form-group">
        <input type="password" id="loginPassword" placeholder="密码">
      </div>
      <div class="error" id="loginError"></div>
      <button class="btn" onclick="login()">登录</button>
      <div class="auth-link">
        <a href="#" onclick="showRegister()">没有账号？立即注册</a>
      </div>
    </div>
    <div id="registerForm" style="display: none;">
      <div class="form-group">
        <input type="text" id="registerId" placeholder="账号ID（用于登录）">
      </div>
      <div class="form-group">
        <input type="text" id="registerName" placeholder="昵称">
      </div>
      <div class="form-group">
        <input type="password" id="registerPassword" placeholder="密码">
      </div>
      <div class="form-group">
        <input type="password" id="registerConfirmPassword" placeholder="确认密码">
      </div>
      <div class="error" id="registerError"></div>
      <button class="btn" onclick="register()">注册</button>
      <div class="auth-link">
        <a href="#" onclick="showLogin()">已有账号？立即登录</a>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    
    let currentUser = null;
    let currentChatId = null;
    let currentChatType = null;
    let pollingInterval = null;
    let selectedContacts = [];
    
    function showTab(tab) {
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab-item[data-tab="${tab}"]`).classList.add('active');
      
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      
      if (tab === 'chat') {
        document.getElementById('chatPage').classList.add('active');
        loadChats();
      } else if (tab === 'contact') {
        document.getElementById('contactPage').classList.add('active');
        loadContacts();
      } else if (tab === 'group') {
        document.getElementById('groupPage').classList.add('active');
        loadGroups();
      } else if (tab === 'profile') {
        document.getElementById('profilePage').classList.add('active');
        updateProfile();
      }
    }
    
    function getAvatar(name, isGroup = false) {
      if (isGroup) return '👥';
      return name.charAt(0).toUpperCase();
    }
    
    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 86400000 && date.getDate() === now.getDate()) {
        return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }
      return date.toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' });
    }
    
    function checkAuth() {
      const user = localStorage.getItem('aihub_user');
      if (user) {
        currentUser = JSON.parse(user);
        document.getElementById('authOverlay').style.display = 'none';
        loadChats();
        startPolling();
      } else {
        document.getElementById('authOverlay').style.display = 'block';
      }
    }
    
    async function login() {
      const id = document.getElementById('loginId').value;
      const password = document.getElementById('loginPassword').value;
      
      try {
        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          currentUser = data.user;
          localStorage.setItem('aihub_user', JSON.stringify(data.user));
          localStorage.setItem('aihub_token', data.token);
          document.getElementById('authOverlay').style.display = 'none';
          loadChats();
          startPolling();
        } else {
          document.getElementById('loginError').textContent = data.error || '登录失败';
          document.getElementById('loginError').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('loginError').textContent = '网络错误';
        document.getElementById('loginError').style.display = 'block';
      }
    }
    
    async function register() {
      const id = document.getElementById('registerId').value;
      const name = document.getElementById('registerName').value;
      const password = document.getElementById('registerPassword').value;
      const confirmPassword = document.getElementById('registerConfirmPassword').value;
      
      if (password !== confirmPassword) {
        document.getElementById('registerError').textContent = '两次密码输入不一致';
        document.getElementById('registerError').style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/api/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, name, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert('注册成功！请登录');
          showLogin();
        } else {
          document.getElementById('registerError').textContent = data.error || '注册失败';
          document.getElementById('registerError').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('registerError').textContent = '网络错误';
        document.getElementById('registerError').style.display = 'block';
      }
    }
    
    function showRegister() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
    }
    
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
    }
    
    async function loadChats() {
      const token = localStorage.getItem('aihub_token');
      try {
        const response = await fetch(`${API_BASE}/api/chats`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const chats = await response.json();
          renderChats(chats);
        }
      } catch (error) {
        console.error('加载会话失败:', error);
      }
    }
    
    function renderChats(chats) {
      const chatList = document.getElementById('chatList');
      
      if (chats.length === 0) {
        chatList.innerHTML = '<div class="empty-state">暂无会话<br>点击联系人发起聊天</div>';
        return;
      }
      
      chatList.innerHTML = chats.map(chat => `
        <div class="chat-list-item" onclick="openChat('${chat.id}', '${chat.type}')">
          <div class="avatar ${chat.type === 'group' ? 'group' : ''}">${getAvatar(chat.name, chat.type === 'group')}</div>
          <div class="info">
            <div class="name-row">
              <div class="name">${chat.name}</div>
              <div class="time">${chat.lastMessageTime ? formatTime(chat.lastMessageTime) : ''}</div>
            </div>
            <div class="last-msg">${chat.lastMessage || '暂无消息'}</div>
          </div>
        </div>
      `).join('');
    }
    
    async function loadContacts() {
      const token = localStorage.getItem('aihub_token');
      try {
        const response = await fetch(`${API_BASE}/api/users`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const users = await response.json();
          renderContacts(users);
        }
      } catch (error) {
        console.error('加载联系人失败:', error);
      }
    }
    
    function renderContacts(users) {
      const contactList = document.getElementById('contactList');
      
      if (users.length === 0) {
        contactList.innerHTML = '<div class="empty-state">暂无联系人</div>';
        return;
      }
      
      contactList.innerHTML = users.map(user => `
        <div class="contact-list-item" onclick="openChat('${user.id}', 'private')">
          <div class="avatar">${getAvatar(user.name)}</div>
          <div class="name">${user.name}</div>
          <div class="arrow">›</div>
        </div>
      `).join('');
    }
    
    async function loadGroups() {
      const token = localStorage.getItem('aihub_token');
      try {
        const response = await fetch(`${API_BASE}/api/groups`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const groups = await response.json();
          renderGroups(groups);
        }
      } catch (error) {
        console.error('加载群聊失败:', error);
      }
    }
    
    function renderGroups(groups) {
      const groupList = document.getElementById('groupList');
      
      if (groups.length === 0) {
        groupList.innerHTML = '<div class="empty-state">暂无群聊<br>从通讯录发起群聊</div>';
        return;
      }
      
      groupList.innerHTML = groups.map(group => `
        <div class="chat-list-item" onclick="openChat('${group.id}', 'group')">
          <div class="avatar group">👥</div>
          <div class="info">
            <div class="name-row">
              <div class="name">${group.name}</div>
              <div class="time">${group.lastMessageTime ? formatTime(group.lastMessageTime) : ''}</div>
            </div>
            <div class="last-msg">${group.lastMessage || '暂无消息'}</div>
          </div>
        </div>
      `).join('');
    }
    
    document.getElementById('showAllContacts').onclick = function() {
      openSelectContact();
    };
    
    async function openSelectContact() {
      selectedContacts = [];
      const token = localStorage.getItem('aihub_token');
      try {
        const response = await fetch(`${API_BASE}/api/users`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const users = await response.json();
          renderSelectableContacts(users);
          document.getElementById('selectContactOverlay').classList.add('active');
          document.getElementById('selectContactModal').classList.add('active');
        }
      } catch (error) {
        console.error('加载联系人失败:', error);
      }
    }
    
    function renderSelectableContacts(users) {
      const list = document.getElementById('selectableContactList');
      list.innerHTML = users.map(user => `
        <div class="selectable-item" data-id="${user.id}" data-name="${user.name}" onclick="toggleSelectContact(this)">
          <div class="checkbox"></div>
          <div class="avatar">${getAvatar(user.name)}</div>
          <div class="name">${user.name}</div>
        </div>
      `).join('');
    }
    
    function toggleSelectContact(el) {
      const id = el.dataset.id;
      const name = el.dataset.name;
      
      el.classList.toggle('selected');
      
      if (el.classList.contains('selected')) {
        selectedContacts.push({ id, name });
      } else {
        selectedContacts = selectedContacts.filter(c => c.id !== id);
      }
      
      document.getElementById('selectedCount').textContent = `已选择 ${selectedContacts.length} 人`;
    }
    
    function closeSelectContact() {
      document.getElementById('selectContactOverlay').classList.remove('active');
      document.getElementById('selectContactModal').classList.remove('active');
    }
    
    async function createGroup() {
      if (selectedContacts.length < 2) {
        alert('请选择至少2个人创建群聊');
        return;
      }
      
      const name = prompt('请输入群聊名称：', '群聊');
      if (!name) return;
      
      const token = localStorage.getItem('aihub_token');
      const memberIds = selectedContacts.map(c => c.id);
      
      try {
        const response = await fetch(`${API_BASE}/api/groups`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ name, memberIds })
        });
        
        if (response.ok) {
          const group = await response.json();
          closeSelectContact();
          openChat(group.id, 'group');
        } else {
          alert('创建群聊失败');
        }
      } catch (error) {
        alert('网络错误');
      }
    }
    
    async function openChat(chatId, chatType) {
      currentChatId = chatId;
      currentChatType = chatType;
      
      await loadMessages();
      
      if (chatType === 'group') {
        const token = localStorage.getItem('aihub_token');
        const response = await fetch(`${API_BASE}/api/groups/${chatId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (response.ok) {
          const group = await response.json();
          document.getElementById('chatMemberCount').textContent = `${group.members.length} 位群成员 ›`;
        }
      } else {
        document.getElementById('chatMemberCount').textContent = '';
      }
      
      document.getElementById('chatDetailOverlay').classList.add('active');
      document.getElementById('chatDetailModal').classList.add('active');
      
      document.getElementById('messageInput').focus();
    }
    
    function closeChatDetail() {
      currentChatId = null;
      currentChatType = null;
      document.getElementById('chatDetailOverlay').classList.remove('active');
      document.getElementById('chatDetailModal').classList.remove('active');
    }
    
    async function loadMessages() {
      const token = localStorage.getItem('aihub_token');
      const endpoint = currentChatType === 'group' 
        ? `${API_BASE}/api/groups/${currentChatId}/messages`
        : `${API_BASE}/api/messages/${currentChatId}`;
      
      try {
        const response = await fetch(endpoint, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (response.ok) {
          const messages = await response.json();
          renderMessages(messages);
        }
      } catch (error) {
        console.error('加载消息失败:', error);
      }
    }
    
    function renderMessages(messages) {
      const messagesEl = document.getElementById('messages');
      
      messagesEl.innerHTML = messages.map(msg => {
        const isSent = msg.senderId === currentUser.id;
        const showName = currentChatType === 'group' && !isSent;
        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div class="avatar">${getAvatar(msg.senderName)}</div>
            <div class="content-wrapper">
              ${showName ? `<div class="name">${msg.senderName}</div>` : ''}
              <div class="bubble">${msg.content}</div>
            </div>
          </div>
        `;
      }).join('');
      
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content) return;
      
      const token = localStorage.getItem('aihub_token');
      const endpoint = currentChatType === 'group'
        ? `${API_BASE}/api/groups/${currentChatId}/messages`
        : `${API_BASE}/api/messages`;
      
      const body = currentChatType === 'group'
        ? { content }
        : { receiverId: currentChatId, content };
      
      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(body)
        });
        
        if (response.ok) {
          input.value = '';
          await loadMessages();
          loadChats();
        }
      } catch (error) {
        console.error('发送消息失败:', error);
      }
    }
    
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    function showGroupMembers() {
      const token = localStorage.getItem('aihub_token');
      fetch(`${API_BASE}/api/groups/${currentChatId}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(r => r.json()).then(group => {
        const list = document.getElementById('groupMembersList');
        list.innerHTML = group.members.map(m => `
          <div class="contact-list-item">
            <div class="avatar">${getAvatar(m.name)}</div>
            <div class="name">${m.name}</div>
          </div>
        `).join('');
        
        document.getElementById('groupMembersOverlay').classList.add('active');
        document.getElementById('groupMembersModal').classList.add('active');
      });
    }
    
    function closeGroupMembers() {
      document.getElementById('groupMembersOverlay').classList.remove('active');
      document.getElementById('groupMembersModal').classList.remove('active');
    }
    
    function updateProfile() {
      document.getElementById('profileAvatar').textContent = getAvatar(currentUser.name);
      document.getElementById('profileName').textContent = currentUser.name;
      document.getElementById('profileId').textContent = `ID: ${currentUser.id}`;
    }
    
    document.getElementById('editNameBtn').onclick = function() {
      document.getElementById('newNameInput').value = currentUser.name;
      document.getElementById('editNameOverlay').classList.add('active');
      document.getElementById('editNameModal').classList.add('active');
    };
    
    function closeEditName() {
      document.getElementById('editNameOverlay').classList.remove('active');
      document.getElementById('editNameModal').classList.remove('active');
      document.getElementById('editNameError').style.display = 'none';
    }
    
    async function saveName() {
      const newName = document.getElementById('newNameInput').value.trim();
      if (!newName) return;
      
      const token = localStorage.getItem('aihub_token');
      const response = await fetch(`${API_BASE}/api/profile`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ type: 'name', newName })
      });
      
      if (response.ok) {
        const data = await response.json();
        currentUser = data.user;
        localStorage.setItem('aihub_user', JSON.stringify(data.user));
        closeEditName();
        updateProfile();
      } else {
        const data = await response.json();
        document.getElementById('editNameError').textContent = data.error;
        document.getElementById('editNameError').style.display = 'block';
      }
    }
    
    document.getElementById('changePasswordBtn').onclick = function() {
      document.getElementById('currentPasswordInput').value = '';
      document.getElementById('newPasswordInput').value = '';
      document.getElementById('confirmPasswordInput').value = '';
      document.getElementById('changePasswordOverlay').classList.add('active');
      document.getElementById('changePasswordModal').classList.add('active');
    };
    
    function closeChangePassword() {
      document.getElementById('changePasswordOverlay').classList.remove('active');
      document.getElementById('changePasswordModal').classList.remove('active');
      document.getElementById('changePasswordError').style.display = 'none';
    }
    
    async function savePassword() {
      const currentPassword = document.getElementById('currentPasswordInput').value;
      const newPassword = document.getElementById('newPasswordInput').value;
      const confirmPassword = document.getElementById('confirmPasswordInput').value;
      
      if (newPassword !== confirmPassword) {
        document.getElementById('changePasswordError').textContent = '两次密码输入不一致';
        document.getElementById('changePasswordError').style.display = 'block';
        return;
      }
      
      const token = localStorage.getItem('aihub_token');
      const response = await fetch(`${API_BASE}/api/profile`, {
        method: 'PUT',
        headers: { 
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ type: 'password', currentPassword, newPassword })
      });
      
      if (response.ok) {
        alert('密码修改成功！');
        closeChangePassword();
      } else {
        const data = await response.json();
        document.getElementById('changePasswordError').textContent = data.error;
        document.getElementById('changePasswordError').style.display = 'block';
      }
    }
    
    document.getElementById('logoutBtn').onclick = function() {
      if (confirm('确定退出登录？')) {
        localStorage.removeItem('aihub_user');
        localStorage.removeItem('aihub_token');
        currentUser = null;
        if (pollingInterval) clearInterval(pollingInterval);
        document.getElementById('authOverlay').style.display = 'block';
      }
    };
    
    function startPolling() {
      if (pollingInterval) clearInterval(pollingInterval);
      
      pollingInterval = setInterval(async () => {
        if (currentChatId) {
          await loadMessages();
        }
        await loadChats();
      }, 3000);
    }
    
    checkAuth();
  </script>
</body>
</html>
